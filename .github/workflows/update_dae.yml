name: Aggiorna DAE Puglia da OpenStreetMap

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-rdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python overpass_to_rdf.py --output-dir ./output
      - run: python3 -c "from rdflib import Graph; g=Graph(); g.parse('output/dae_puglia.ttl',format='turtle'); print(f'OK: {len(g)} triple')"
      - run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/dae_puglia.ttl output/dae_puglia.rdf output/last_update.json
          git diff --cached --quiet || git commit -m "chore: aggiornamento DAE Puglia $(date -u +%Y-%m-%d)"
          git push
